<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Sun icon — same path as navbar logo, scaled 2.6× and centred -->
  <g transform="translate(18, 18) scale(2.667)"
     fill="none" stroke="white" stroke-width="1.6"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- 8 rays -->
    <line x1="12" y1="2"     x2="12" y2="6"/>
    <line x1="12" y1="18"    x2="12" y2="22"/>
    <line x1="2"  y1="12"    x2="6"  y2="12"/>
    <line x1="18" y1="12"    x2="22" y2="12"/>
    <line x1="4.93"  y1="4.93"  x2="7.76"  y2="7.76"/>
    <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
    <line x1="19.07" y1="4.93"  x2="16.24" y2="7.76"/>
    <line x1="4.93"  y1="19.07" x2="7.76"  y2="16.24"/>
    <!-- Centre circle -->
    <circle cx="12" cy="12" r="3"/>
  </g>
</svg>
